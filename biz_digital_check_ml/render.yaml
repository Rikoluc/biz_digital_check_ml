services:
  - type: web
    name: biz-digital-check-ml
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: db
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
